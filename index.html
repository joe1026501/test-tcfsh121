<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyAnXOFj8WlwnhSsafzk7pb7mQns6C2XOOU",
  authDomain: "tcfsh121-39745.firebaseapp.com",
  projectId: "tcfsh121-39745",
  storageBucket: "tcfsh121-39745.firebasestorage.app",
  messagingSenderId: "728144870430",
  appId: "1:728144870430:web:948099ce5b0c62e66d820f"
};

// 初始化（只做一次）
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const msgCol = collection(db, "messages");

// 即時監聽
const q = query(msgCol, orderBy("timestamp", "asc"));
onSnapshot(q, (snapshot) => {
    const div = document.getElementById('messages');
    div.innerHTML = '';
    snapshot.forEach(doc => {
        const data = doc.data();
        div.innerHTML += `<div class="msg"><b>${data.user || '匿名'}:</b> ${data.text}</div>`;
    });
    div.scrollTop = div.scrollHeight;
});

// 發送留言
window.sendMessage = async () => {
    const user = document.getElementById('userInput').value;
    const text = document.getElementById('msgInput').value;
    if (!text) return alert("請輸入內容");

    try {
        await addDoc(msgCol, {
            user: user,
            text: text,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = '';
    } catch (e) {
        console.error(e);
        alert("寫入失敗");
    }
};
</script>
